name: Deploy Project Arjun to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gods-eye-maharashtra/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: gods-eye-maharashtra

      - name: Build
        run: npm run build
        working-directory: gods-eye-maharashtra

      - name: Switch Cesium to CDN
        run: |
          sed -i 's|/project-arjun/cesium/Widgets/widgets.css|https://cesium.com/downloads/cesiumjs/releases/1.127/Build/Cesium/Widgets/widgets.css|g' gods-eye-maharashtra/dist/index.html
          sed -i 's|/project-arjun/cesium/Cesium.js|https://cesium.com/downloads/cesiumjs/releases/1.127/Build/Cesium/Cesium.js|g' gods-eye-maharashtra/dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gods-eye-maharashtra/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
